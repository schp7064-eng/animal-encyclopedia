<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동물 도감 마스터 28</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{font-family:sans-serif;background:#f5f5f5}
.card{transition:.2s}
.card:hover{transform:translateY(-5px)}
</style>
</head>

<body>

<h1 style="text-align:center;font-size:30px;margin:20px;">🐾 동물 도감 마스터 28</h1>

<div id="grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:20px;"></div>

<script>

const animals = [
{ name:"나비", img:"https://upload.wikimedia.org/wikipedia/commons/9/9c/Butterfly_macro_shot.jpg"},
{ name:"토끼", img:"https://upload.wikimedia.org/wikipedia/commons/1/1b/European_Rabbit%2C_Bia%C5%82owie%C5%BCa_Forest.jpg"},
{ name:"달팽이", img:"https://upload.wikimedia.org/wikipedia/commons/6/6d/Common_snail.jpg"},
{ name:"뱀", img:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Grass_snake_%28Natrix_natrix%29.jpg"},
{ name:"꿀벌", img:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Apis_mellifera.jpg"},
{ name:"무당벌레", img:"https://upload.wikimedia.org/wikipedia/commons/f/f2/Coccinella_septempunctata.jpg"},
{ name:"직박구리", img:"https://upload.wikimedia.org/wikipedia/commons/b/b3/Brown-eared_Bulbul.jpg"},
{ name:"개미", img:"https://upload.wikimedia.org/wikipedia/commons/9/9e/Ant.jpg"},
{ name:"두더지", img:"https://upload.wikimedia.org/wikipedia/commons/8/87/European_mole.jpg"},
{ name:"지렁이", img:"https://upload.wikimedia.org/wikipedia/commons/3/30/Regenwurm1.jpg"},
{ name:"붕어", img:"https://upload.wikimedia.org/wikipedia/commons/1/1b/CarassiusCarassius8.JPG"},
{ name:"미꾸라지", img:"https://upload.wikimedia.org/wikipedia/commons/7/7b/Misgurnus_anguillicaudatus.jpg"},
{ name:"개구리", img:"https://upload.wikimedia.org/wikipedia/commons/5/58/Dark-spotted_Frog.jpg"},
{ name:"수달", img:"https://upload.wikimedia.org/wikipedia/commons/b/b5/Fischotter_Lutra_lutra.jpg"},
{ name:"돌고래", img:"https://upload.wikimedia.org/wikipedia/commons/1/10/Tursiops_truncatus.jpg"},
{ name:"오징어", img:"https://upload.wikimedia.org/wikipedia/commons/d/dd/Loligo_vulgaris.jpg"},
{ name:"꽃게", img:"https://upload.wikimedia.org/wikipedia/commons/f/f8/Portunus_trituberculatus.jpg"},
{ name:"가오리", img:"https://upload.wikimedia.org/wikipedia/commons/7/75/Stingray.jpg"},
{ name:"바다거북", img:"https://upload.wikimedia.org/wikipedia/commons/b/bb/Hawaii_turtle.jpg"},
{ name:"해마", img:"https://upload.wikimedia.org/wikipedia/commons/2/25/Hippocampus.jpg"},
{ name:"북극곰", img:"https://upload.wikimedia.org/wikipedia/commons/0/09/Polar_Bear.jpg"},
{ name:"하프물범", img:"https://upload.wikimedia.org/wikipedia/commons/3/36/Harp_seal_pup.jpg"},
{ name:"순록", img:"https://upload.wikimedia.org/wikipedia/commons/7/76/Reindeer_in_Lapland.jpg"},
{ name:"낙타", img:"https://upload.wikimedia.org/wikipedia/commons/0/0c/Camelus_dromedarius.jpg"},
{ name:"사막전갈", img:"https://upload.wikimedia.org/wikipedia/commons/c/c5/Scorpion.jpg"},
{ name:"사막여우", img:"https://upload.wikimedia.org/wikipedia/commons/9/9c/Fennec_Fox.jpg"},
{ name:"이집트땅거북", img:"https://upload.wikimedia.org/wikipedia/commons/2/25/Testudo_kleinmanni.jpg"}
];

const grid = document.getElementById("grid");

animals.forEach(a=>{
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${a.img}" style="width:100%;height:120px;object-fit:cover;border-radius:10px"
         onerror="this.src='https://via.placeholder.com/150?text=이미지없음'">
    <p style="text-align:center;font-weight:bold">${a.name}</p>
  `;
  grid.appendChild(div);
});

</script>

</body>
</html>
